<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .product-container {
      width: 80%;
      max-width: 600px;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    .product-image {
      width: 100%;
      height: 300px;
      background: #ddd;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #555;
      font-size: 20px;
    }
    .product-title {
      font-size: 24px;
      margin-bottom: 10px;
    }
    .product-description {
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
    }
    .home-button {
      display: inline-block;
      background: #007BFF;
      color: #fff;
      padding: 12px 20px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 16px;
    }
    .home-button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="product-container">
    <div class="product-image">[ Product Image Mockup ]</div>
    <h2 class="product-title">Sample Product</h2>
    <p class="product-description">
      This is a placeholder description for the product. You can add details such as features, specifications, and pricing here.
    </p>
    <a href="index.html" class="home-button">Home Page</a>
  </div>
</body>
</html>
