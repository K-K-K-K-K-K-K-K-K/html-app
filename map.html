<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .map-container {
      width: 80%;
      height: 70%;
      border: 2px solid #aaa;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .home-button {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: #007BFF;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      font-size: 16px;
    }
    .home-button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="map-container">
    <!-- Google Maps embed iframe -->
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3875.731!2d100.514!3d13.828!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x30e29c!2sBang%20Khen!5e0!3m2!1sen!2sth!4v1610000000000" 
      allowfullscreen="" 
      loading="lazy">
    </iframe>
    <a href="index.html" class="home-button">Home Page</a>
  </div>
</body>
</html>
