<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Services</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 50px auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .service-card {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      transition: transform 0.2s ease;
    }
    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .service-card h3 {
      margin-bottom: 10px;
      color: #007BFF;
    }
    .service-card p {
      font-size: 14px;
      color: #555;
    }
    .home-button {
      display: block;
      width: fit-content;
      margin: 30px auto 0;
      background: #007BFF;
      color: #fff;
      padding: 12px 20px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 16px;
    }
    .home-button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Our Services</h1>
    <div class="services">
      <div class="service-card">
        <h3>Web Design</h3>
        <p>We create modern, responsive websites tailored to your brand and audience.</p>
      </div>
      <div class="service-card">
        <h3>Development</h3>
        <p>From front-end to back-end, we build scalable and efficient applications.</p>
